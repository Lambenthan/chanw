name: Refresh news feed

on:
  # 每 6 小时跑一次：抓取 + 评分 + 写回 news.json
  schedule:
    - cron: "0 */6 * * *"
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write # 允许把 refresh 后的数据 commit 回 main

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Extract feeds (RSS + HTML + Playwright)
        # 单源失败不阻塞别的源
        continue-on-error: true
        run: node scripts/news/extract-feed.mjs

      - name: Extract GitHub trending repos
        # 不阻塞别的 step；GITHUB_TOKEN 走 actions 自带, rate limit 5000/hr
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/news/extract-github.mjs

      - name: Enrich missing publishedAt
        continue-on-error: true
        env:
          MAX_NEW: "80"
        run: node scripts/news/enrich-feed-dates.mjs

      - name: Score and tag new items (free OpenRouter models only)
        if: env.OPENROUTER_API_KEY != ''
        continue-on-error: true
        timeout-minutes: 12
        run: node scripts/news/score-and-tag.mjs --concurrency 4

      # === news 质量理念常驻步骤 ===
      # 抓 JS 渲染源(OpenAI/Google/DeepMind)真实发布日期 → news-date-overrides.json
      # 增量 + 限流: 每次 cron 最多 80 条, 历史 archive 分批消化, 之后只抓新增
      - name: Resolve real dates for JS-rendered sources
        continue-on-error: true
        timeout-minutes: 8
        env:
          MAX_NEW: "80"
        run: node scripts/news/prune-news.mjs

      # LLM 滤通稿(参展/获奖/区域扩展/企业合作/行业报告) → news-exclude.json 黑名单
      # 增量: 跳过已判为通稿的, 只判新增 lab 源
      - name: Filter press-release noise
        if: env.OPENROUTER_API_KEY != ''
        continue-on-error: true
        timeout-minutes: 6
        run: node scripts/news/filter-press-releases.mjs

      # convert 消费 overrides + exclude 黑名单 + 砍 90 天窗 + JS源假戳排除
      - name: Convert scored feed to news.json
        run: node scripts/news/convert-feed-to-news.mjs

      - name: Commit refreshed snapshots back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/news.json \
            src/data/news-date-overrides.json \
            src/data/news-date-attempted.json \
            src/data/news-exclude.json \
            src/data/generated/feed-raw.json \
            src/data/generated/feed-scored.json \
            src/data/generated/feed-dates.json \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无新数据，跳过 commit"
            exit 0
          fi
          git commit -m "chore: 定时刷新 news feed [skip ci]"

          # 推送 + 冲突恢复，最多重试 3 次
          # 数据文件冲突时一律保留本地版本（pipeline 输出是真相，
          # 远程的版本只是上一次 cron 跑出来的旧快照）。在 rebase
          # 语境下 -X theirs = 保留正在 rebase 的 commit（即我们刚生成的）
          for attempt in 1 2 3; do
            if git push origin HEAD:main 2>&1; then
              echo "✓ Push 成功（第 $attempt 次尝试）"
              exit 0
            fi
            echo "Push 失败 ($attempt/3)，尝试 fetch + rebase"
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              echo "rebase 自动合并失败，强制 checkout 本地版本"
              git checkout --theirs src/data/ 2>/dev/null || true
              git add src/data/ 2>/dev/null || true
              git rebase --continue 2>/dev/null || git rebase --abort
            fi
          done
          echo "Push 重试 3 次仍失败"
          exit 1
